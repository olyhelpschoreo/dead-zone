  } else if (wp.renderStyle === 'chaingun') { // Chaingun-style
    drawHand(0, 25);
    const rot = frameCount * 0.3;
    // Receiver body
    metalGrad(-18, -60, 36, 80, 90, 90, 95);
    edgeHighlight(-18, -60, 36, 80);
    // Rotating barrels
    for (let i = 0; i < 6; i++) {
      const a = rot + i * Math.PI / 3;
      const bx = Math.cos(a) * 8, by = Math.sin(a) * 8;
      metalGrad(-2.5 + bx, -140 + by, 5, 70, 70, 70, 80);
    }
    // Front barrel ring
    mainCtx.strokeStyle = '#888';
    mainCtx.lineWidth = 2;
    mainCtx.beginPath(); mainCtx.arc(0, -135, 12, 0, Math.PI * 2); mainCtx.stroke();
    mainCtx.beginPath(); mainCtx.arc(0, -90, 12, 0, Math.PI * 2); mainCtx.stroke();
    // Center hub
    const hubG = mainCtx.createRadialGradient(0, -130, 0, 0, -130, 10);
    hubG.addColorStop(0, '#aaa');
    hubG.addColorStop(1, '#555');
    mainCtx.fillStyle = hubG;
    mainCtx.beginPath(); mainCtx.arc(0, -130, 8, 0, Math.PI * 2); mainCtx.fill();
    // Rear hub
    metalGrad(-14, -65, 28, 10, 70, 70, 75);
    // Grip
    const gripG2 = mainCtx.createLinearGradient(-14, 0, 14, 60);
    gripG2.addColorStop(0, '#5a3520');
    gripG2.addColorStop(1, '#3a1a08');
    mainCtx.fillStyle = gripG2;
    mainCtx.fillRect(-14, 0, 28, 55);
    // Ammo belt hint
    mainCtx.strokeStyle = '#b8a040';
    mainCtx.lineWidth = 3;
    mainCtx.beginPath();
    mainCtx.moveTo(-20, -30);
    mainCtx.bezierCurveTo(-35, -20, -40, 10, -30, 40);
    mainCtx.stroke();
    mainCtx.strokeStyle = '#907830';
    mainCtx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const t = i / 8;
      const beltX = -20 + (-30 - (-20)) * t * t + ((-35 + 20) * 2 * t * (1 - t));
      const beltY = -30 + (40 + 30) * t;
      mainCtx.beginPath();
      mainCtx.moveTo(beltX - 3, beltY);
      mainCtx.lineTo(beltX + 3, beltY);
      mainCtx.stroke();
    }
    if (player.shootCooldown > 0 && mouseDown) muzzleFlash(0, -148, 10);
  } else if (wp.renderStyle === 'rocket') { // Rocket-style
    drawHand(0, 25);
    // Main tube
    const tubeG = mainCtx.createLinearGradient(-20, -80, 20, 10);
    tubeG.addColorStop(0, '#6a7a5a');
    tubeG.addColorStop(0.5, '#4a5a3a');
    tubeG.addColorStop(1, '#3a4a2a');
    mainCtx.fillStyle = tubeG;
    mainCtx.fillRect(-20, -80, 40, 90);
    edgeHighlight(-20, -80, 40, 90);
    // Forward tube
    const fwdG = mainCtx.createLinearGradient(-16, -145, 16, -75);
    fwdG.addColorStop(0, '#5a6a4a');
    fwdG.addColorStop(0.5, '#4a5a3a');
    fwdG.addColorStop(1, '#3a4a2a');
    mainCtx.fillStyle = fwdG;
    mainCtx.fillRect(-16, -145, 32, 70);
    edgeHighlight(-16, -145, 32, 70);
    // Muzzle opening
    const muzzG = mainCtx.createRadialGradient(0, -145, 2, 0, -145, 16);
    muzzG.addColorStop(0, '#0a0a0a');
    muzzG.addColorStop(0.7, '#1a1a1a');
    muzzG.addColorStop(1, '#3a4a2a');
    mainCtx.fillStyle = muzzG;
    mainCtx.beginPath(); mainCtx.arc(0, -145, 16, 0, Math.PI * 2); mainCtx.fill();
    // Inner ring
    mainCtx.strokeStyle = '#555';
    mainCtx.lineWidth = 2;
    mainCtx.beginPath(); mainCtx.arc(0, -145, 12, 0, Math.PI * 2); mainCtx.stroke();
    // Sight rail
    mainCtx.fillStyle = '#333';
    mainCtx.fillRect(-3, -160, 6, 18);
    // Iron sight
    mainCtx.fillStyle = '#f00';
    mainCtx.fillRect(-1, -162, 2, 6);
    // Warning stripes
    mainCtx.fillStyle = '#cc0';
    mainCtx.fillRect(-18, -82, 36, 4);
    mainCtx.fillStyle = '#222';
    for (let i = 0; i < 6; i++) {
      mainCtx.fillRect(-18 + i * 12, -82, 6, 4);
    }
    // Grip
    const rGrip = mainCtx.createLinearGradient(-14, 0, 14, 55);
    rGrip.addColorStop(0, '#5a3520');
    rGrip.addColorStop(1, '#3a1a08');
    mainCtx.fillStyle = rGrip;
    mainCtx.fillRect(-14, 0, 28, 55);
    if (player.shootCooldown > wp.fireRate - 5) {
      muzzleFlash(0, -150, 25);
      // Backblast smoke
      const smokeAlpha = player.shootCooldown / wp.fireRate;
      for (let s = 0; s < 3; s++) {
        const sr = 12 + s * 10;
        const sy = 40 + s * 15;
        mainCtx.fillStyle = `rgba(120,120,110,${smokeAlpha * (0.4 - s * 0.1)})`;
        mainCtx.beginPath(); mainCtx.arc(s * 3 - 3, sy, sr, 0, Math.PI * 2); mainCtx.fill();
      }
    }
  }

  mainCtx.restore();

  // Reload bar
  if (player.reloading) {
    const wp = weapons[player.weaponIdx];
    const pct = 1 - player.reloadTimer / wp.reloadTime;
    mainCtx.fillStyle = 'rgba(0,0,0,0.6)';
    mainCtx.fillRect(W/2 - 60, H/2 + 40, 120, 12);
    mainCtx.fillStyle = '#fc0';
    mainCtx.fillRect(W/2 - 58, H/2 + 42, 116 * pct, 8);
    mainCtx.fillStyle = '#fc0';
    mainCtx.font = `${14 * (W/1280)}px 'Courier New'`;
    mainCtx.textAlign = 'center';
    mainCtx.fillText('RELOADING', W/2, H/2 + 70);
  }
}

// ============================================================
// HUD RENDERING
// ============================================================
function renderHUD(W, H) {
  const s = Math.min(W, H) / 800;
  mainCtx.save();

  // --- Crosshair (modern dynamic style) ---
  const cx = W/2, cy = H/2;
  const crossStyle = weapons[player.weaponIdx].renderStyle;
  const spread = crossStyle === 'shotgun' ? 14 : crossStyle === 'chaingun' ? 10 : 6;
  const cs = spread * s;
  const firing = player.shootCooldown > 0;
  const moving = player.moving;
  const moveSpread = moving ? 3 * s : 0;
  const fireExpand = firing ? 6 * s : 0;
  const totalExpand = moveSpread + fireExpand;
  const hudTheme = activeHudTheme();
  const crossColor = firing ? '#f44' : (hudTheme ? hudTheme.color : '#6f6');
  const crossGlow = firing ? 'rgba(255,60,60,0.3)' : (hudTheme ? hudTheme.glow : 'rgba(60,255,60,0.15)');

  // Outer rotating ring
  mainCtx.globalAlpha = 0.15;
  mainCtx.strokeStyle = crossColor;
  mainCtx.lineWidth = 1;
  mainCtx.save();
  mainCtx.translate(cx, cy);
  mainCtx.rotate(frameCount * 0.01);
  const ringR = cs * 2 + totalExpand;
  mainCtx.beginPath();
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2;
    mainCtx.moveTo(Math.cos(a) * ringR * 0.8, Math.sin(a) * ringR * 0.8);
    mainCtx.lineTo(Math.cos(a) * ringR, Math.sin(a) * ringR);
  }
  mainCtx.stroke();
  mainCtx.restore();

  // Crosshair glow
  mainCtx.globalAlpha = 0.35;
  mainCtx.fillStyle = crossGlow;
  mainCtx.beginPath(); mainCtx.arc(cx, cy, cs * 2 + totalExpand, 0, Math.PI * 2); mainCtx.fill();
  mainCtx.globalAlpha = 0.9;

  // Dynamic crosshair chevrons
  mainCtx.strokeStyle = crossColor;
  mainCtx.lineWidth = 2;
  mainCtx.shadowColor = crossColor;
  mainCtx.shadowBlur = 8;
  const gap = 5 * s + totalExpand * 0.5;
  const armLen = cs + 3;
  mainCtx.beginPath();
  // Left chevron
  mainCtx.moveTo(cx - gap - armLen, cy - 2 * s); mainCtx.lineTo(cx - gap, cy); mainCtx.lineTo(cx - gap - armLen, cy + 2 * s);
  // Right chevron
  mainCtx.moveTo(cx + gap + armLen, cy - 2 * s); mainCtx.lineTo(cx + gap, cy); mainCtx.lineTo(cx + gap + armLen, cy + 2 * s);
  // Top chevron
  mainCtx.moveTo(cx - 2 * s, cy - gap - armLen); mainCtx.lineTo(cx, cy - gap); mainCtx.lineTo(cx + 2 * s, cy - gap - armLen);
  // Bottom chevron
  mainCtx.moveTo(cx - 2 * s, cy + gap + armLen); mainCtx.lineTo(cx, cy + gap); mainCtx.lineTo(cx + 2 * s, cy + gap + armLen);
  mainCtx.stroke();

  // Center dot with pulse
  const dotPulse = firing ? 3 : 1.5 + Math.sin(frameCount * 0.06) * 0.5;
  mainCtx.fillStyle = '#fff';
  mainCtx.beginPath(); mainCtx.arc(cx, cy, dotPulse, 0, Math.PI * 2); mainCtx.fill();
  // Inner ring
  mainCtx.globalAlpha = 0.4;
  mainCtx.strokeStyle = '#fff';
  mainCtx.lineWidth = 0.8;
  mainCtx.beginPath(); mainCtx.arc(cx, cy, 4 * s, 0, Math.PI * 2); mainCtx.stroke();
  mainCtx.shadowBlur = 0;
  mainCtx.globalAlpha = 1;

  // --- Modern bottom HUD ---
  const hudH = 85 * s;
  const hudY = H - hudH;
  // Gradient HUD background
  const hudBg = mainCtx.createLinearGradient(0, hudY, 0, H);
  hudBg.addColorStop(0, 'rgba(0,0,0,0)');
  hudBg.addColorStop(0.15, 'rgba(0,0,0,0.6)');
  hudBg.addColorStop(1, 'rgba(0,0,0,0.85)');
  mainCtx.fillStyle = hudBg;
  mainCtx.fillRect(0, hudY, W, hudH);
  // Top line accent
  mainCtx.strokeStyle = 'rgba(80,200,80,0.25)';
  mainCtx.lineWidth = 1;
  mainCtx.beginPath(); mainCtx.moveTo(0, hudY + hudH * 0.15); mainCtx.lineTo(W, hudY + hudH * 0.15); mainCtx.stroke();

  // --- Health bar (modern segmented) ---
  const barY = hudY + 22 * s;
  const barH = 16 * s;
  const barW = 220 * s;
  const hpPct = player.health / player.maxHealth;
  const hpColor = hpPct > 0.6 ? '#0d0' : hpPct > 0.3 ? '#fc0' : '#f22';
  const hpGlow = hpPct > 0.6 ? 'rgba(0,220,0,' : hpPct > 0.3 ? 'rgba(255,200,0,' : 'rgba(255,40,40,';

  // Bar background
  mainCtx.fillStyle = 'rgba(40,0,0,0.6)';
  mainCtx.fillRect(20 * s, barY, barW, barH);
  // Health fill with glow
  const hpGrad = mainCtx.createLinearGradient(20 * s, barY, 20 * s + barW * hpPct, barY);
  hpGrad.addColorStop(0, hpColor);
  hpGrad.addColorStop(1, hpPct > 0.6 ? '#0a0' : hpPct > 0.3 ? '#a80' : '#a00');
  mainCtx.fillStyle = hpGrad;
  mainCtx.fillRect(20 * s, barY, barW * hpPct, barH);
  // Shine on top
  mainCtx.fillStyle = 'rgba(255,255,255,0.12)';
  mainCtx.fillRect(20 * s, barY, barW * hpPct, barH * 0.4);
  // Segmentation marks
  mainCtx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = 1; i < 10; i++) mainCtx.fillRect(20 * s + barW * i / 10, barY, 1, barH);
  // Border
  mainCtx.strokeStyle = 'rgba(150,150,150,0.4)';
  mainCtx.lineWidth = 1;
  mainCtx.strokeRect(20 * s, barY, barW, barH);
  // HP icon + text
  mainCtx.fillStyle = hpColor;
  mainCtx.shadowColor = hpColor;
  mainCtx.shadowBlur = 8;
  mainCtx.font = `bold ${13 * s}px 'Courier New'`;
  mainCtx.textAlign = 'left';
  mainCtx.fillText(`HP ${Math.ceil(player.health)}`, 25 * s, barY + barH - 3 * s);
  mainCtx.shadowBlur = 0;

  // Armor bar
  if (player.armor > 0) {
    const armorY = barY + barH + 5 * s;
    const armorH = barH * 0.6;
    const armorPct = player.armor / player.maxArmor;
    mainCtx.fillStyle = 'rgba(0,0,60,0.6)';
    mainCtx.fillRect(20 * s, armorY, barW, armorH);
    const armorGrad = mainCtx.createLinearGradient(20 * s, armorY, 20 * s + barW, armorY);
    armorGrad.addColorStop(0, '#48f');
    armorGrad.addColorStop(1, '#26a');
    mainCtx.fillStyle = armorGrad;
    mainCtx.fillRect(20 * s, armorY, barW * armorPct, armorH);
    mainCtx.fillStyle = 'rgba(255,255,255,0.1)';
    mainCtx.fillRect(20 * s, armorY, barW * armorPct, armorH * 0.4);
    mainCtx.strokeStyle = 'rgba(100,140,255,0.3)';
    mainCtx.strokeRect(20 * s, armorY, barW, armorH);
    mainCtx.fillStyle = '#8bf';
    mainCtx.font = `${10 * s}px 'Courier New'`;
    mainCtx.fillText(`ARMOR ${Math.ceil(player.armor)}`, 25 * s, armorY + armorH - 2 * s);
  }

  // --- Ammo display (large, glowing) ---
  const wp = weapons[player.weaponIdx];
  mainCtx.textAlign = 'right';
  mainCtx.font = `bold ${36 * s}px 'Courier New'`;
  mainCtx.fillStyle = wp.color;
  mainCtx.shadowColor = wp.color;
  mainCtx.shadowBlur = 12;
  const ammoText = wp.ammo === Infinity ? 'INF' : String(player.weaponAmmo[player.weaponIdx]);
  mainCtx.fillText(ammoText, W - 30 * s, hudY + 42 * s);
  mainCtx.shadowBlur = 0;
  mainCtx.font = `${11 * s}px 'Courier New'`;
  mainCtx.fillStyle = '#999';
  mainCtx.fillText(wp.name.toUpperCase(), W - 30 * s, hudY + 58 * s);

  // Weapon rack (modern pills)
  const rackW = 44 * s;
  const rackH = 26 * s;
  const rackStart = W / 2 - (weapons.length * rackW) / 2;
  for (let i = 0; i < weapons.length; i++) {
    if (!player.hasWeapon[i]) continue;
    const rx = rackStart + i * rackW + 2;
    const ry = hudY + 12 * s;
    const selected = i === player.weaponIdx;
    // Rounded rect
    const radius = 4 * s;
    mainCtx.beginPath();
    mainCtx.roundRect(rx, ry, rackW - 4 * s, rackH, radius);
    mainCtx.fillStyle = selected ? 'rgba(255,200,0,0.25)' : 'rgba(40,40,40,0.5)';
    mainCtx.fill();
    mainCtx.strokeStyle = selected ? '#fc0' : '#444';
    mainCtx.lineWidth = selected ? 2 : 1;
    mainCtx.stroke();
    if (selected) {
      mainCtx.shadowColor = '#fc0';
      mainCtx.shadowBlur = 6;
    }
    mainCtx.fillStyle = selected ? '#fc0' : '#777';
    mainCtx.font = `bold ${14 * s}px 'Courier New'`;
    mainCtx.textAlign = 'center';
    mainCtx.fillText(String(i + 1), rx + (rackW - 4 * s) / 2, ry + rackH - 7 * s);
    mainCtx.shadowBlur = 0;
  }

  // --- Top right stats (modern style) ---
  mainCtx.textAlign = 'right';
  // Score
  mainCtx.font = `bold ${20 * s}px 'Courier New'`;
  mainCtx.fillStyle = '#fc0';
  mainCtx.shadowColor = '#fc0';
  mainCtx.shadowBlur = 8;
  mainCtx.fillText(`SCORE: ${player.score}`, W - 20 * s, 30 * s);
  mainCtx.shadowBlur = 0;
  // Wave
  mainCtx.fillStyle = '#f80';
  mainCtx.font = `bold ${14 * s}px 'Courier New'`;
  mainCtx.fillText(`WAVE ${wave}`, W - 20 * s, 50 * s);
  // Kills
  mainCtx.fillStyle = '#e55';
  mainCtx.font = `${13 * s}px 'Courier New'`;
  mainCtx.fillText(`UNDEAD SLAIN: ${player.kills}`, W - 20 * s, 68 * s);

  // Combo (pulsing, larger)
  if (player.combo > 1) {
    const comboAlpha = Math.min(1, player.comboTimer / 30);
    const comboPulse = 1 + Math.sin(frameCount * 0.15) * 0.1;
    mainCtx.globalAlpha = comboAlpha;
    mainCtx.save();
    mainCtx.translate(W / 2, 50 * s);
    mainCtx.scale(comboPulse, comboPulse);
    mainCtx.fillStyle = '#f0f';
    mainCtx.shadowColor = '#f0f';
    mainCtx.shadowBlur = 15;
    mainCtx.font = `bold ${26 * s}px 'Courier New'`;
    mainCtx.textAlign = 'center';
    mainCtx.fillText(`${player.combo}x COMBO`, 0, 0);
    mainCtx.shadowBlur = 0;
    mainCtx.restore();
    mainCtx.globalAlpha = 1;
  }

  // FPS + enemies (top left, minimal)
  mainCtx.textAlign = 'left';
  mainCtx.font = `${10 * s}px 'Courier New'`;
  mainCtx.fillStyle = 'rgba(100,100,100,0.7)';
  mainCtx.fillText(`FPS: ${fps}`, 10 * s, 16 * s);
  const alive = enemies.filter(e => e.deathTimer < 0).length;
  mainCtx.fillStyle = 'rgba(180,70,70,0.8)';
  mainCtx.fillText(`ZOMBIES: ${alive}`, 10 * s, 30 * s);

  // Kill feed (left side, styled)
  mainCtx.textAlign = 'left';
  for (let i = 0; i < killFeed.length; i++) {
    const kf = killFeed[i];
    const kfAlpha = Math.min(1, kf.timer / 60);
    mainCtx.globalAlpha = kfAlpha;
    // Background pill
    mainCtx.fillStyle = 'rgba(80,0,0,0.4)';
    const tw = mainCtx.measureText ? 200 : 200;
    mainCtx.fillRect(8 * s, 46 * s + i * 20 * s, tw * s, 16 * s);
    mainCtx.fillStyle = '#fcc';
    mainCtx.font = `${11 * s}px 'Courier New'`;
    mainCtx.fillText(kf.text, 12 * s, 58 * s + i * 20 * s);
  }
  mainCtx.globalAlpha = 1;

  // Notifications (centered, dramatic)
  for (let i = 0; i < notifications.length; i++) {
    const n = notifications[i];
    const alpha = Math.min(1, n.timer / 30);
    const yOffset = (1 - n.timer / n.maxTimer) * 30;
    const scale = 1 + (1 - n.timer / n.maxTimer) * 0.2;
    mainCtx.globalAlpha = alpha;
    mainCtx.save();
    mainCtx.translate(W / 2, H / 2 - 60 * s - i * 38 * s - yOffset);
    mainCtx.scale(scale, scale);
    mainCtx.fillStyle = n.color;
    mainCtx.shadowColor = n.color;
    mainCtx.shadowBlur = 20;
    mainCtx.font = `bold ${30 * s}px 'Courier New'`;
    mainCtx.textAlign = 'center';
    mainCtx.fillText(n.text, 0, 0);
    mainCtx.shadowBlur = 0;
    mainCtx.restore();
  }
  mainCtx.globalAlpha = 1;

  mainCtx.restore();
}

// ============================================================
// MINIMAP
// ============================================================
function renderMinimap(W, H) {
  const s = Math.min(W, H) / 800;
  const mapSize = 150 * s;
  const mx = W - mapSize - 12 * s;
  const my = H - 85 * s - mapSize - 12 * s;
  const cellSize = mapSize / MAP_W;

  mainCtx.save();

  // Circular minimap with border
  mainCtx.beginPath();
  mainCtx.arc(mx + mapSize / 2, my + mapSize / 2, mapSize / 2, 0, Math.PI * 2);
  mainCtx.clip();

  // Background
  mainCtx.globalAlpha = 0.75;
  mainCtx.fillStyle = 'rgba(0,5,0,0.8)';
  mainCtx.fillRect(mx, my, mapSize, mapSize);

  // Walls
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const t = getMap(x, y);
      if (t > 0) {
        const colors = ['','#6a6','#a66','#66a','#a84','#4a6','#666'];
        mainCtx.fillStyle = colors[t] || '#6a6';
        mainCtx.globalAlpha = 0.7;
        mainCtx.fillRect(mx + x * cellSize, my + y * cellSize, cellSize + 0.5, cellSize + 0.5);
      }
    }
  }
  mainCtx.globalAlpha = 0.75;

  // Gore splats on minimap
  mainCtx.fillStyle = 'rgba(120,20,10,0.4)';
  for (const gs of goreSplats) {
    const gr = gs.size * cellSize * 1.5;
    mainCtx.beginPath();
    mainCtx.arc(mx + gs.x * cellSize, my + gs.y * cellSize, gr, 0, Math.PI * 2);
    mainCtx.fill();
  }

  // Pickups (pulsing dots)
  for (const p of pickups) {
    const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.08 + p.bobPhase);
    mainCtx.globalAlpha = pulse * 0.9;
    mainCtx.fillStyle = p.type === 'health' ? '#f55' : p.type === 'ammo' ? '#ff0' : '#5af';
    mainCtx.beginPath();
    mainCtx.arc(mx + p.x * cellSize, my + p.y * cellSize, 2.5, 0, Math.PI * 2);
    mainCtx.fill();
  }
  mainCtx.globalAlpha = 0.75;

  // Enemies (colored dots with direction)
  for (const e of enemies) {
    if (e.deathTimer >= 0) continue;
    const eColor = e.type === 'boss' ? '#f0f' : e.type === 'heavy' ? '#8f0' : e.type === 'demon' ? '#f80' : '#f55';
    mainCtx.fillStyle = eColor;
    mainCtx.shadowColor = eColor;
    mainCtx.shadowBlur = 4;
    mainCtx.beginPath();
    mainCtx.arc(mx + e.x * cellSize, my + e.y * cellSize, e.type === 'boss' ? 3.5 : 2, 0, Math.PI * 2);
    mainCtx.fill();
    mainCtx.shadowBlur = 0;
  }

  // Player (green with FOV cone)
  const pcx = mx + player.x * cellSize;
  const pcy = my + player.y * cellSize;
  // FOV cone
  mainCtx.fillStyle = 'rgba(0,255,0,0.08)';
  mainCtx.beginPath();
  mainCtx.moveTo(pcx, pcy);
  const fovHalf = FOV / 2;
  const coneLen = 5 * cellSize;
  mainCtx.lineTo(pcx + Math.cos(player.angle - fovHalf) * coneLen, pcy + Math.sin(player.angle - fovHalf) * coneLen);
  mainCtx.lineTo(pcx + Math.cos(player.angle) * coneLen * 1.1, pcy + Math.sin(player.angle) * coneLen * 1.1);
  mainCtx.lineTo(pcx + Math.cos(player.angle + fovHalf) * coneLen, pcy + Math.sin(player.angle + fovHalf) * coneLen);
  mainCtx.fill();
  // Player dot
  mainCtx.fillStyle = '#0f0';
  mainCtx.shadowColor = '#0f0';
  mainCtx.shadowBlur = 6;
  mainCtx.beginPath();
  mainCtx.arc(pcx, pcy, 3, 0, Math.PI * 2);
  mainCtx.fill();
  mainCtx.shadowBlur = 0;
  // Direction line
  mainCtx.strokeStyle = '#0f0';
  mainCtx.lineWidth = 1.5;
  mainCtx.beginPath();
  mainCtx.moveTo(pcx, pcy);
  mainCtx.lineTo(pcx + Math.cos(player.angle) * 3 * cellSize, pcy + Math.sin(player.angle) * 3 * cellSize);
  mainCtx.stroke();

  mainCtx.restore();

  // Circular border on top of clip
  mainCtx.save();
  mainCtx.strokeStyle = 'rgba(0,200,0,0.3)';
  mainCtx.lineWidth = 2;
  mainCtx.beginPath();
  mainCtx.arc(mx + mapSize / 2, my + mapSize / 2, mapSize / 2, 0, Math.PI * 2);
  mainCtx.stroke();
  // Outer glow ring
  mainCtx.strokeStyle = 'rgba(0,150,0,0.1)';
  mainCtx.lineWidth = 4;
  mainCtx.stroke();
  mainCtx.restore();
}

// ============================================================
// SCREEN EFFECTS
// ============================================================
function renderScreenEffects(W, H) {
  // --- Scanlines (subtle, every 3rd line) ---
  mainCtx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let sy = 0; sy < H; sy += 3) {
    mainCtx.fillRect(0, sy, W, 1);
  }

  // --- Chromatic aberration (stronger at edges) ---
  mainCtx.globalCompositeOperation = 'screen';
  const leftG = mainCtx.createLinearGradient(0, 0, W * 0.12, 0);
  leftG.addColorStop(0, 'rgba(255,0,0,0.1)');
  leftG.addColorStop(1, 'rgba(255,0,0,0)');
  mainCtx.fillStyle = leftG;
  mainCtx.fillRect(0, 0, W * 0.12, H);
  const rightG = mainCtx.createLinearGradient(W * 0.88, 0, W, 0);
  rightG.addColorStop(0, 'rgba(0,255,255,0)');
  rightG.addColorStop(1, 'rgba(0,255,255,0.1)');
  mainCtx.fillStyle = rightG;
  mainCtx.fillRect(W * 0.88, 0, W * 0.12, H);
  // Top/bottom chromatic
  const topG = mainCtx.createLinearGradient(0, 0, 0, H * 0.08);
  topG.addColorStop(0, 'rgba(180,0,255,0.04)');
  topG.addColorStop(1, 'rgba(180,0,255,0)');
  mainCtx.fillStyle = topG;
  mainCtx.fillRect(0, 0, W, H * 0.08);
  mainCtx.globalCompositeOperation = 'source-over';

  // --- Dramatic vignette (tighter, more cinematic) ---
  const vignette = mainCtx.createRadialGradient(W/2, H/2, W * 0.2, W/2, H/2, W * 0.72);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(0.4, 'rgba(0,0,0,0)');
  vignette.addColorStop(0.7, 'rgba(0,0,0,0.2)');
  vignette.addColorStop(0.85, 'rgba(0,0,0,0.45)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.7)');
  mainCtx.fillStyle = vignette;
  mainCtx.fillRect(0, 0, W, H);

  // --- Ambient occlusion (darken top/bottom edges for depth) ---
  const aoTop = mainCtx.createLinearGradient(0, 0, 0, H * 0.15);
  aoTop.addColorStop(0, 'rgba(0,0,0,0.15)');
  aoTop.addColorStop(1, 'rgba(0,0,0,0)');
  mainCtx.fillStyle = aoTop;
  mainCtx.fillRect(0, 0, W, H * 0.15);
  const aoBot = mainCtx.createLinearGradient(0, H * 0.88, 0, H);
  aoBot.addColorStop(0, 'rgba(0,0,0,0)');
  aoBot.addColorStop(1, 'rgba(0,0,0,0.12)');
  mainCtx.fillStyle = aoBot;
  mainCtx.fillRect(0, H * 0.88, W, H * 0.12);

  // --- Cinematic color grading (slight teal shadows + orange highlights) ---
  // Teal in shadows
  mainCtx.fillStyle = 'rgba(0,15,12,0.06)';
  mainCtx.fillRect(0, 0, W, H);
  // Warm highlights (very subtle orange push via screen blend)
  mainCtx.globalCompositeOperation = 'screen';
  mainCtx.fillStyle = 'rgba(12,6,0,0.03)';
  mainCtx.fillRect(0, 0, W, H);
  mainCtx.globalCompositeOperation = 'source-over';

  // --- Light shafts from ceiling (subtle volumetric beams) ---
  const lsDirX = Math.cos(player.angle), lsDirY = Math.sin(player.angle);
  const lsPlaneX = -lsDirY * PLANE_MULT, lsPlaneY = lsDirX * PLANE_MULT;
  for (let shaft = 0; shaft < 4; shaft++) {
    const lx = (Math.floor(player.x / 4) * 4 + 2 + shaft * 4 - 6);
    const ly = (Math.floor(player.y / 4) * 4 + 2);
    if (getMap(Math.floor(lx), Math.floor(ly)) !== 0) continue;
    const sdx = lx - player.x, sdy = ly - player.y;
    const sdist = Math.hypot(sdx, sdy);
    if (sdist > 5) continue;
    const sinvDet = 1.0 / (lsPlaneX * lsDirY - lsDirX * lsPlaneY);
    const sty = sinvDet * (-lsPlaneY * sdx + lsPlaneX * sdy);
    if (sty < 0.8) continue;
    const stx = sinvDet * (lsDirY * sdx - lsDirX * sdy);
    const screenX = (W / 2) * (1 + stx / sty);
    if (screenX < -50 || screenX > W + 50) continue;
    const beamW = W / sty * 0.15;
    const distFade = Math.max(0, 1 - sdist / 5);
    const flicker = 0.85 + 0.15 * Math.sin(frameCount * 0.04 + shaft * 2.5);
    mainCtx.globalAlpha = 0.06 * distFade * flicker;
    mainCtx.fillStyle = 'rgba(255,230,170,1)';
    mainCtx.beginPath();
    mainCtx.moveTo(screenX - beamW * 0.12, H * 0.05);
    mainCtx.lineTo(screenX + beamW * 0.12, H * 0.05);
    mainCtx.lineTo(screenX + beamW * 0.5, H * 0.6);
    mainCtx.lineTo(screenX - beamW * 0.5, H * 0.6);
    mainCtx.fill();
    mainCtx.globalAlpha = 1;
  }

  // --- Heat shimmer near torches (cheap rising-heat overlay) ---
  {
    let heatCount = 0;
    for (const lt of pointLights) {
      if (!lt.permanent || !lt.flicker || heatCount >= 2) continue;
      const dx = lt.x - player.x, dy = lt.y - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 5) continue;
      const invDet = 1.0 / (r_planeX * r_dirY - r_dirX * r_planeY);
      const htx = invDet * (r_dirY * dx - r_dirX * dy);
      const hty = invDet * (-r_planeY * dx + r_planeX * dy);
      if (hty <= 0.5 || hty > 8) continue;
      const screenX = (W / 2) * (1 + htx / hty);
      if (screenX < 0 || screenX > W) continue;
      heatCount++;
      const distFade = Math.max(0, 1 - dist / 5);
      const shimmerW = Math.floor(30 / hty);
      const shimmerH = Math.floor(60 / hty);
      const baseY = Math.floor(H * 0.2);
      // Draw wavy heat lines rising upward
      mainCtx.globalAlpha = distFade * 0.08;
      mainCtx.strokeStyle = `rgba(${lt.r},${lt.g},${lt.b},0.4)`;
      mainCtx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const ox = (i - 1) * shimmerW * 0.4;
        mainCtx.beginPath();
        for (let hy = 0; hy < shimmerH; hy += 4) {
          const wave = Math.sin(hy * 0.2 + frameCount * 0.1 + i) * shimmerW * 0.3;
          const yy = baseY + hy;
          if (hy === 0) mainCtx.moveTo(screenX + ox + wave, yy);
          else mainCtx.lineTo(screenX + ox + wave, yy);
        }
        mainCtx.stroke();
      }
      mainCtx.globalAlpha = 1;
    }
  }

  // --- Screen blood splatters ---
  for (let i = screenBlood.length - 1; i >= 0; i--) {
    const bl = screenBlood[i];
    bl.timer--;
    bl.dripLen += bl.drip;
    if (bl.timer <= 0) { screenBlood.splice(i, 1); continue; }
    const fadeIn = Math.min(1, (180 + 120 - bl.timer) / 10);
    const fadeOut = Math.min(1, bl.timer / 60);
    const a = bl.alpha * fadeIn * fadeOut;
    const bx = bl.x * W, by = bl.y * H;
    mainCtx.globalAlpha = a;

    // Main splat
    mainCtx.fillStyle = 'rgba(100,0,0,0.9)';
    mainCtx.beginPath();
    mainCtx.ellipse(bx, by, bl.size * 0.5, bl.size * 0.4, Math.random() * 0.1, 0, Math.PI * 2);
    mainCtx.fill();
    // Darker center
    mainCtx.fillStyle = 'rgba(60,0,0,0.8)';
    mainCtx.beginPath();
    mainCtx.ellipse(bx, by, bl.size * 0.25, bl.size * 0.2, 0, 0, Math.PI * 2);
    mainCtx.fill();
    // Drip
    if (bl.drip > 0.05 && bl.dripLen > 2) {
      mainCtx.fillStyle = 'rgba(80,0,0,0.7)';
      const dripW = 2 + bl.size * 0.05;
      mainCtx.fillRect(bx - dripW / 2, by, dripW, bl.dripLen);
      // Drip bulge at bottom
      mainCtx.beginPath();
      mainCtx.arc(bx, by + bl.dripLen, dripW, 0, Math.PI * 2);
      mainCtx.fill();
    }
    // Spatter dots around main splat
    mainCtx.fillStyle = 'rgba(90,0,0,0.6)';
    for (let sp = 0; sp < 3; sp++) {
      const spx = bx + (hashNoise(i * 3 + sp, 0) - 0.5) * bl.size * 1.5;
      const spy = by + (hashNoise(0, i * 3 + sp) - 0.5) * bl.size * 1.2;
      const sps = 1 + hashNoise(sp, i) * 3;
      mainCtx.beginPath();
      mainCtx.arc(spx, spy, sps, 0, Math.PI * 2);
      mainCtx.fill();
    }
  }
  mainCtx.globalAlpha = 1;

  // --- Low health effects (red overlay + blood border + heartbeat) ---
  if (player.health < 35) {
    const severity = 1 - player.health / 35;
    const heartbeat = Math.pow(Math.sin(frameCount * 0.08) * 0.5 + 0.5, 3);
    const pulse = heartbeat * severity;

    // Red overlay
    mainCtx.fillStyle = `rgba(120,0,0,${pulse * 0.3})`;
    mainCtx.fillRect(0, 0, W, H);

    // Blood border vignette (gets thicker as health drops)
    const borderG = mainCtx.createRadialGradient(W/2, H/2, W * (0.35 - severity * 0.15), W/2, H/2, W * 0.55);
    borderG.addColorStop(0, 'rgba(100,0,0,0)');
    borderG.addColorStop(0.7, `rgba(80,0,0,${severity * 0.3})`);
    borderG.addColorStop(1, `rgba(60,0,0,${severity * 0.6})`);
    mainCtx.fillStyle = borderG;
    mainCtx.fillRect(0, 0, W, H);

    // Blood drips from top at critical health
    if (player.health < 15) {
      for (let i = 0; i < 8; i++) {
        const dripX = (hashNoise(i, 42) * W);
        const dripH = 20 + hashNoise(i, 43) * 80 + pulse * 30;
        const dripW = 3 + hashNoise(i, 44) * 6;
        mainCtx.fillStyle = `rgba(100,0,0,${0.3 + pulse * 0.3})`;
        // Organic drip shape
        mainCtx.beginPath();
        mainCtx.moveTo(dripX - dripW, 0);
        mainCtx.bezierCurveTo(dripX - dripW, dripH * 0.4, dripX + dripW, dripH * 0.4, dripX + dripW, 0);
        mainCtx.lineTo(dripX + dripW * 0.5, dripH * 0.9);
        mainCtx.arc(dripX, dripH, dripW * 0.6, 0, Math.PI);
        mainCtx.lineTo(dripX - dripW * 0.5, dripH * 0.9);
        mainCtx.fill();
      }
    }
  }

  // --- Damage direction indicators (glowing) ---
  for (const dd of player.damageDir) {
    if (dd.time <= 0) continue;
    const alpha = dd.time / 30;
    const a = dd.angle - player.angle;
    const indicatorDist = Math.min(W, H) * 0.38;
    const ix = W/2 + Math.cos(a) * indicatorDist;
    const iy = H/2 + Math.sin(a) * indicatorDist;
    mainCtx.save();
    mainCtx.translate(ix, iy);
    mainCtx.rotate(a);
    mainCtx.globalAlpha = alpha;
    // Glow
    mainCtx.shadowColor = '#f00';
    mainCtx.shadowBlur = 15;
    mainCtx.fillStyle = '#f00';
    mainCtx.beginPath();
    mainCtx.moveTo(18, 0);
    mainCtx.lineTo(-6, -10);
    mainCtx.lineTo(-6, 10);
    mainCtx.fill();
    mainCtx.shadowBlur = 0;
    mainCtx.globalAlpha = 1;
    mainCtx.restore();
  }

  // --- Weapon flash overlay ---
  if (player.shootCooldown > weapons[player.weaponIdx].fireRate - 2) {
    const flashT = player.shootCooldown / weapons[player.weaponIdx].fireRate;
    const flashG = mainCtx.createRadialGradient(W * 0.58, H * 0.7, 0, W/2, H/2, W * 0.8);
    flashG.addColorStop(0, `rgba(255,200,100,${flashT * 0.18})`);
    flashG.addColorStop(0.5, `rgba(255,150,50,${flashT * 0.05})`);
    flashG.addColorStop(1, 'rgba(255,100,20,0)');
    mainCtx.fillStyle = flashG;
    mainCtx.fillRect(0, 0, W, H);
  }

  // --- Lightning flash overlay ---
  if (lightningFlash > 0.1) {
    mainCtx.fillStyle = `rgba(200,210,230,${lightningFlash * 0.15})`;
    mainCtx.fillRect(0, 0, W, H);
  }

  // --- Subtle CRT scanlines ---
  mainCtx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let sy = 0; sy < H; sy += 3) {
    mainCtx.fillRect(0, sy, W, 1);
  }

  // --- Film grain (animated) ---
  const grainAlpha = 0.012 + (frameCount % 2) * 0.005;
  mainCtx.fillStyle = `rgba(255,255,255,${grainAlpha})`;
  for (let g = 0; g < 40; g++) {
    mainCtx.fillRect(Math.random() * W, Math.random() * H, 1 + Math.random(), 1 + Math.random());
  }
  mainCtx.fillStyle = `rgba(0,0,0,${grainAlpha})`;
  for (let g = 0; g < 25; g++) {
    mainCtx.fillRect(Math.random() * W, Math.random() * H, 1 + Math.random(), 1 + Math.random());
  }

  // --- Subtle lens flare when looking at bright lights (max 2) ---
  let flareCount = 0;
  for (const lt of pointLights) {
    if (!lt.permanent || flareCount >= 2) continue;
    const dx = lt.x - player.x, dy = lt.y - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 4) continue;
    const invDet = 1.0 / (r_planeX * r_dirY - r_dirX * r_planeY);
    const ltx = invDet * (r_dirY * dx - r_dirX * dy);
    const lty = invDet * (-r_planeY * dx + r_planeX * dy);
    if (lty <= 0.3 || lty > 5) continue;
    const screenLX = (W / 2) * (1 + ltx / lty);
    if (screenLX < 0 || screenLX > W) continue;
    flareCount++;
    const screenLY = r_halfH + r_pitchOffset;
    const brightness = Math.max(0, 1 - dist / 4) * 0.12;
    // Lens flare streak
    const flareG = mainCtx.createRadialGradient(screenLX, screenLY, 0, screenLX, screenLY, 60 / lty);
    flareG.addColorStop(0, `rgba(${lt.r},${lt.g},${lt.b},${brightness})`);
    flareG.addColorStop(0.5, `rgba(${lt.r},${lt.g},${lt.b},${brightness * 0.3})`);
    flareG.addColorStop(1, `rgba(${lt.r},${lt.g},${lt.b},0)`);
    mainCtx.fillStyle = flareG;
    mainCtx.fillRect(screenLX - 60, screenLY - 60, 120, 120);
    // Secondary flare (opposite side of screen)
    const fx = W - screenLX, fy = H - screenLY;
    mainCtx.globalAlpha = brightness * 0.2;
    mainCtx.fillStyle = `rgba(${Math.floor(lt.r*0.5)},${Math.floor(lt.g*0.5)},${Math.floor(lt.b*0.5)},0.3)`;
    mainCtx.beginPath();
    mainCtx.arc(fx, fy, 8 / lty, 0, Math.PI * 2);
    mainCtx.fill();
    mainCtx.globalAlpha = 1;
  }
}

// ============================================================
// COLLISION
// ============================================================
function canMove(x, y, radius = 0.2) {
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++) {
      const cx = x + dx * radius, cy = y + dy * radius;
      if (getMap(Math.floor(cx), Math.floor(cy)) !== 0) return false;
    }
  return true;
}

// ============================================================
// SHOOTING
// ============================================================
function fireWeapon() {
  const wp = weapons[player.weaponIdx];
  if (player.shootCooldown > 0 || player.reloading) return;
  if (wp.ammo !== Infinity && player.weaponAmmo[player.weaponIdx] <= 0) {
    playSound('empty_click');
    startReload();
    return;
  }

  player.shootCooldown = wp.fireRate;
  if (wp.ammo !== Infinity) player.weaponAmmo[player.weaponIdx]--;
  player.weaponKickback = 1;
  player.shakeAmount = Math.max(player.shakeAmount, wp.splashR > 0 ? 0.5 : 0.15);
  player.shotsFired++;

  // Spawn muzzle smoke (capped)
  if (smokeParticles.length > 60) smokeParticles.splice(0, 10);
  const smokeCount = wp.renderStyle === 'shotgun' ? 4 : wp.renderStyle === 'chaingun' ? 2 : 1;
  for (let i = 0; i < smokeCount; i++) {
    const sd = 0.4 + Math.random() * 0.3;
    smokeParticles.push({
      x: player.x + Math.cos(player.angle) * sd,
      y: player.y + Math.sin(player.angle) * sd,
      z: -0.1 + Math.random() * 0.2,
      vx: Math.cos(player.angle) * 0.01 + (Math.random()-0.5)*0.008,
      vy: Math.sin(player.angle) * 0.01 + (Math.random()-0.5)*0.008,
      vz: 0.005 + Math.random()*0.003,
      life: 40 + Math.random() * 40, maxLife: 80,
      size: 2 + Math.random() * 3, alpha: 0.2 + Math.random() * 0.15,
    });
  }

  playSound(wp.sound);

  if (wp.projSpeed > 0) {
    // Rocket launcher - spawn projectile
    projectiles.push({
      x: player.x + Math.cos(player.angle) * 0.5,
      y: player.y + Math.sin(player.angle) * 0.5,
      dx: Math.cos(player.angle) * wp.projSpeed,
      dy: Math.sin(player.angle) * wp.projSpeed,
      damage: wp.damage, splashR: wp.splashR,
      life: 300, owner: 'player',
    });
    return;
  }

  // Hitscan weapons
  for (let p = 0; p < wp.pellets; p++) {
    const spread = (Math.random() - 0.5) * wp.spread * 2;
    const rayAngle = player.angle + spread;
    const rdx = Math.cos(rayAngle), rdy = Math.sin(rayAngle);
    const wallHit = castRay(player.x, player.y, rdx, rdy);

    let closestEnemy = null, closestDist = wallHit.dist;

    for (const e of enemies) {
      if (e.deathTimer >= 0) continue;
      const ex = e.x - player.x, ey = e.y - player.y;
      const dot = ex * rdx + ey * rdy;
      if (dot < 0 || dot > closestDist) continue;
      const perpX = ex - rdx * dot, perpY = ey - rdy * dot;
      const perp = Math.hypot(perpX, perpY);
      if (perp < e.radius && dot < closestDist) {
        closestDist = dot;
        closestEnemy = e;
      }
    }

    if (closestEnemy) {
      const dmg = wp.damage * (0.8 + Math.random() * 0.4);
      damageEnemy(closestEnemy, dmg);
      player.shotsHit++;
    } else {
      // Wall hit sparks
      const hx = player.x + rdx * wallHit.dist;
      const hy = player.y + rdy * wallHit.dist;
      spawnParticles(hx, hy, 0, 4, { r: 255, g: 200, b: 100, spread: 0.03, life: 0.5, size: 2 });
    }
  }
}

function damageEnemy(e, dmg) {
  e.health -= dmg;
  e.hitFlash = 6;
  e.state = 'alert';
  player.totalDamageDealt += dmg;
  playSound('hit');

  spawnParticles(e.x, e.y, 0, 6, { r: 200, g: 20, b: 20, spread: 0.04, life: 0.8, size: 3 });

  if (e.health <= 0 && e.deathTimer < 0) {
    e.deathTimer = 0;
    player.kills++;
    player.score += e.scoreValue * Math.max(1, player.combo);
    player.combo++;
    player.comboTimer = 180;
    if (player.combo > player.bestCombo) player.bestCombo = player.combo;

    const label = enemyDefs[e.type]?.label || e.type.toUpperCase();
    addKillFeed(`Killed ${label} +${e.scoreValue * Math.max(1, player.combo - 1)}`);
    playSound('enemy_death');

    // Gore splat on floor
    addGoreSplat(e.x, e.y, e.type === 'boss' ? 1.5 : e.type === 'heavy' ? 1.2 : 0.6);

    // Death particles - more blood spray + dissolve sparks
    spawnParticles(e.x, e.y, 0, 20, { r: 180, g: 30, b: 20, spread: 0.07, life: 1.5, size: 4 });
    // Dissolve particles (float upward like ashes)
    const zone = getZone(Math.floor(e.x), Math.floor(e.y));
    const dColors = [[180,160,50],[60,180,60],[50,150,100],[200,40,30]];
    const dc = dColors[zone];
    spawnParticles(e.x, e.y, -0.2, 12, { r: dc[0], g: dc[1], b: dc[2], spread: 0.03, life: 2.5, size: 2.5 });
    // Bone/flesh chunks
    spawnParticles(e.x, e.y, 0, 5, { r: 220, g: 180, b: 150, spread: 0.04, life: 0.8, size: 3 });

    // Bloater explodes on death
    if (e.type === 'heavy') {
      explode(e.x, e.y, 30, 2.5);
      spawnParticles(e.x, e.y, 0, 20, { r: 80, g: 120, b: 20, spread: 0.08, life: 1.5, size: 5 });
    }

    // Chance to drop pickup on death
    if (Math.random() < 0.3) {
      const type = Math.random() < 0.6 ? 'health' : 'ammo';
      pickups.push({
        x: e.x, y: e.y, type,
        bobPhase: 0,
        sprite: pickupSprites[type],
      });
    }
  }
}

function startReload() {
  const wp = weapons[player.weaponIdx];
  if (player.reloading || wp.ammo === Infinity) return;
  if (player.weaponAmmo[player.weaponIdx] >= wp.maxAmmo) return;
  player.reloading = true;
  player.reloadTimer = wp.reloadTime;
  playSound('reload');
}

// ============================================================
// EXPLOSIONS (for rockets)
// ============================================================
function explode(x, y, damage, radius) {
  playSound('explosion');
  player.shakeAmount = Math.max(player.shakeAmount, 0.8);
  // Dynamic explosion light
  pointLights.push({ x, y, r: 255, g: 180, b: 60, intensity: 6, flicker: false, permanent: false, phase: 0 });
  // Gore splat
  addGoreSplat(x, y, radius * 0.4);

  // Damage enemies in radius
  for (const e of enemies) {
    if (e.deathTimer >= 0) continue;
    const dist = Math.hypot(e.x - x, e.y - y);
    if (dist < radius) {
      const falloff = 1 - dist / radius;
      damageEnemy(e, damage * falloff);
    }
  }

  // Damage player if close
  const playerDist = Math.hypot(player.x - x, player.y - y);
  if (playerDist < radius) {
    const falloff = 1 - playerDist / radius;
    hurtPlayer(damage * falloff * 0.5, Math.atan2(y - player.y, x - player.x));
  }

  // Big particle explosion
  spawnParticles(x, y, 0, 30, { r: 255, g: 150, b: 30, spread: 0.1, life: 1.5, size: 6 });
  spawnParticles(x, y, 0, 15, { r: 255, g: 60, b: 20, spread: 0.06, life: 2, size: 8 });
  spawnParticles(x, y, 0, 10, { r: 100, g: 100, b: 100, spread: 0.04, life: 2.5, size: 5 });
  // Shockwave ring
  shockwaves.push({ x, y, radius: 0.1, maxRadius: radius * 1.5, speed: 0.3, alpha: 0.8 });
  // Lingering smoke
  for (let i = 0; i < 8; i++) {
    smokeParticles.push({
      x: x + (Math.random()-0.5)*0.5, y: y + (Math.random()-0.5)*0.5,
      z: -0.2 + Math.random() * 0.4,
      vx: (Math.random()-0.5)*0.01, vy: (Math.random()-0.5)*0.01, vz: 0.003 + Math.random()*0.005,
      life: 60 + Math.random() * 80, maxLife: 140,
      size: 4 + Math.random() * 6, alpha: 0.4 + Math.random() * 0.2,
    });
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, z, count, opts) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 0.2,
      y: y + (Math.random() - 0.5) * 0.2,
      z: z + (Math.random() - 0.5) * 0.3,
      vx: (Math.random() - 0.5) * opts.spread,
      vy: (Math.random() - 0.5) * opts.spread,
      vz: -Math.random() * opts.spread * 0.5,
      r: Math.min(255, opts.r + Math.floor((Math.random() - 0.5) * 40)),
      g: Math.min(255, opts.g + Math.floor((Math.random() - 0.5) * 20)),
      b: Math.min(255, opts.b + Math.floor((Math.random() - 0.5) * 20)),
      life: opts.life * (0.5 + Math.random() * 0.5),
      size: opts.size * (0.5 + Math.random()),
    });
  }
}

// ============================================================
// PLAYER DAMAGE
// ============================================================
function hurtPlayer(dmg, fromAngle) {
  // Armor absorbs 60% of damage
  let actualDmg = dmg;
  if (player.armor > 0) {
    const absorbed = Math.min(player.armor, dmg * 0.6);
    player.armor -= absorbed;
    actualDmg -= absorbed;
  }
  player.health -= actualDmg;
  player.shakeAmount = Math.max(player.shakeAmount, 0.3);
  player.damageDir.push({ angle: fromAngle, time: 30 });
  playSound('player_hurt');

  // Screen blood splatter
  const numSplats = 2 + Math.floor(actualDmg / 10);
  for (let i = 0; i < numSplats; i++) {
    // Splatters from the direction of damage
    const da = fromAngle - player.angle + (Math.random() - 0.5) * 1.5;
    const edge = 0.3 + Math.random() * 0.2; // how far from center (0.5 = edge)
    screenBlood.push({
      x: 0.5 + Math.cos(da) * edge,
      y: 0.5 + Math.sin(da) * edge,
      size: 15 + Math.random() * 40,
      drip: Math.random() * 0.3, // drip speed
      dripLen: 0,
      alpha: 0.5 + Math.random() * 0.4,
      timer: 180 + Math.random() * 120,
      shape: Math.floor(Math.random() * 3),
    });
  }

  if (player.health <= 0) {
    player.health = 0;
    gameOver = true;
    document.exitPointerLock();
    const earnedCoins = coinsForRun();
    save.coins += earnedCoins;
    if (player.score > save.bestScore) save.bestScore = player.score;
    if (wave > save.bestWave) save.bestWave = wave;
    writeSave();
    updateCoinDisplays();
    const ds = document.getElementById('death-screen');
    ds.style.display = 'flex';
    document.getElementById('death-stats').innerHTML =
      `Score: ${player.score}<br>Survived to Wave: ${wave}<br>Zombies Killed: ${player.kills}<br>` +
      `Best Kill Streak: ${player.bestCombo}x<br>` +
      `Accuracy: ${player.shotsFired > 0 ? Math.floor(player.shotsHit / player.shotsFired * 100) : 0}%<br>` +
      `Total Damage: ${Math.floor(player.totalDamageDealt)}<br>` +
      `<span style="color:#fc0">Coins earned: +${earnedCoins} &nbsp;&middot;&nbsp; Bank: 🪙 ${save.coins}</span>`;
  }
}

// ============================================================
// UPDATE LOOP
// ============================================================
function update() {
  if (!gameStarted || gameOver) return;

  frameCount++;

  // Mouse look
  player.angle += mouseDX * 0.002;
  player.pitch = Math.max(-0.5, Math.min(0.5, player.pitch - mouseDY * 0.0015));
  mouseDX = 0; mouseDY = 0;

  // Movement
  const sprinting = keys['ShiftLeft'] || keys['ShiftRight'];
  const spd = player.speed * (sprinting ? player.sprintMult : 1);
  let mx = 0, my = 0, moving = false;

  if (keys['KeyW']) { mx += Math.cos(player.angle); my += Math.sin(player.angle); moving = true; }
  if (keys['KeyS']) { mx -= Math.cos(player.angle); my -= Math.sin(player.angle); moving = true; }
  if (keys['KeyA']) { mx += Math.cos(player.angle - Math.PI/2); my += Math.sin(player.angle - Math.PI/2); moving = true; }
  if (keys['KeyD']) { mx += Math.cos(player.angle + Math.PI/2); my += Math.sin(player.angle + Math.PI/2); moving = true; }

  player.moving = moving;
  if (moving) {
    const len = Math.hypot(mx, my);
    mx = mx / len * spd; my = my / len * spd;
    if (canMove(player.x + mx, player.y)) player.x += mx;
    if (canMove(player.x, player.y + my)) player.y += my;
    player.bobPhase += sprinting ? 0.2 : 0.13;
    player.viewBob = Math.sin(player.bobPhase) * (sprinting ? 6 : 4);
  } else {
    player.viewBob *= 0.85;
  }

  // Weapon mechanics
  if (player.shootCooldown > 0) player.shootCooldown--;
  player.weaponKickback *= 0.85;
  player.weaponSway = player.weaponSway * 0.9 + (mouseDX * 0.001) * 0.1;

  if (mouseDown && weapons[player.weaponIdx].auto && !player.reloading) {
    fireWeapon();
  }

  // Spawn ember particles near torches
  for (const lt of pointLights) {
    if (!lt.permanent || !lt.flicker) continue;
    if (Math.random() < 0.08 && Math.hypot(lt.x - player.x, lt.y - player.y) < 10) {
      embers.push({
        x: lt.x + (Math.random() - 0.5) * 0.3,
        y: lt.y + (Math.random() - 0.5) * 0.3,
        z: -0.3,
        vx: (Math.random() - 0.5) * 0.01,
        vy: (Math.random() - 0.5) * 0.01,
        vz: -0.008 - Math.random() * 0.008,
        life: 0.8 + Math.random() * 0.5,
        size: 1 + Math.random() * 1.5,
        r: 255, g: 140 + Math.random() * 80, b: 20 + Math.random() * 30,
      });
    }
  }
  // Update embers
  for (let i = embers.length - 1; i >= 0; i--) {
    const em = embers[i];
    em.x += em.vx;
    em.y += em.vy;
    em.z += em.vz;
    em.vx += (Math.random() - 0.5) * 0.002; // drift
    em.life -= 0.015;
    em.g = Math.max(20, em.g - 1);
    if (em.life <= 0) { embers.splice(i, 1); continue; }
  }
  if (embers.length > 80) embers.splice(0, embers.length - 80);

  // Footstep dust when walking
  if (moving && frameCount % 8 === 0) {
    particles.push({
      x: player.x - Math.cos(player.angle) * 0.2 + (Math.random() - 0.5) * 0.2,
      y: player.y - Math.sin(player.angle) * 0.2 + (Math.random() - 0.5) * 0.2,
      z: 0.45,
      vx: (Math.random() - 0.5) * 0.005,
      vy: (Math.random() - 0.5) * 0.005,
      vz: -0.003,
      r: 80, g: 70, b: 55, life: 0.5, size: 2
    });
  }

  // Update ambient dust particles
  for (const d of ambientDust) {
    d.x += d.vx;
    d.y += d.vy;
    d.z += d.vz;
    d.flicker += 0.05;
    // Bounce z
    if (d.z < -0.4 || d.z > 0.4) d.vz = -d.vz;
    // Respawn if too far from player
    const ddx = d.x - player.x, ddy = d.y - player.y;
    if (ddx * ddx + ddy * ddy > 100) {
      const a = Math.random() * Math.PI * 2;
      const r = 2 + Math.random() * 6;
      d.x = player.x + Math.cos(a) * r;
      d.y = player.y + Math.sin(a) * r;
      d.z = -0.3 + Math.random() * 0.6;
    }
  }

  // Update zone-specific particles
  for (const zp of zoneParticles) {
    zp.life++;
    if (zp.type === 'fly') {
      zp.buzzPhase += 0.3;
      zp.vx += (Math.random() - 0.5) * 0.008;
      zp.vy += (Math.random() - 0.5) * 0.008;
      zp.vz += (Math.random() - 0.5) * 0.004;
      zp.vx *= 0.95; zp.vy *= 0.95; zp.vz *= 0.95;
    } else if (zp.type === 'spark') {
      zp.vz -= 0.002; // gravity
    } else if (zp.type === 'drip') {
      zp.vz -= 0.001; // accelerate downward
    }
    zp.x += zp.vx; zp.y += zp.vy; zp.z += zp.vz;

    // Respawn when expired
    if (zp.life > zp.maxLife || zp.z < -0.8 || zp.z > 1.2) {
      const zoneOff = zp.zone === 0 ? [2, 2] : zp.zone === 1 ? [17, 2] : zp.zone === 2 ? [2, 17] : [17, 17];
      zp.x = zoneOff[0] + Math.random() * 13;
      zp.y = zoneOff[1] + Math.random() * 13;
      zp.z = zp.type === 'drip' ? 0.8 : -0.3 + Math.random() * 0.6;
      zp.life = 0;
      if (zp.type === 'spark') { zp.vx = (Math.random()-0.5)*0.02; zp.vy = (Math.random()-0.5)*0.02; zp.vz = 0.01+Math.random()*0.02; }
      if (zp.type === 'drip') { zp.vx = 0; zp.vy = 0; zp.vz = -0.015 - Math.random()*0.01; }
    }
  }

  if (player.reloading) {
    player.reloadTimer--;
    if (player.reloadTimer <= 0) {
      player.reloading = false;
      player.weaponAmmo[player.weaponIdx] = weapons[player.weaponIdx].maxAmmo;
    }
  }

  // Screen shake decay
  player.shakeAmount *= player.shakeDecay;
  if (player.shakeAmount < 0.01) player.shakeAmount = 0;

  // Lightning flash (random atmospheric effect)
  if (lightningFlash > 0) {
    lightningFlash *= 0.8;
    if (lightningFlash < 0.01) lightningFlash = 0;
  }
  lightningTimer--;
  if (lightningTimer <= 0) {
    lightningTimer = 300 + Math.random() * 600; // every 5-15 seconds
    lightningFlash = 0.6 + Math.random() * 0.4;
    player.shakeAmount = Math.max(player.shakeAmount, 0.15);
    // Thunder sound (reuse explosion at low volume)
    if (audioCtx) playSound('explosion', 0.15);
  }

  // Cleanup temporary point lights
  for (let i = pointLights.length - 1; i >= 0; i--) {
    if (!pointLights[i].permanent) {
      pointLights[i].intensity -= 0.15;
      if (pointLights[i].intensity <= 0) pointLights.splice(i, 1);
    }
  }

  // Combo timer
  if (player.comboTimer > 0) {
    player.comboTimer--;
    if (player.comboTimer <= 0) player.combo = 0;
  }

  // Damage direction decay
  player.damageDir = player.damageDir.filter(d => { d.time--; return d.time > 0; });

  // --- Pickup collection ---
  pickups = pickups.filter(p => {
    p.bobPhase += 0.05;
    const dist = Math.hypot(p.x - player.x, p.y - player.y);
    if (dist < 0.8) {
      switch (p.type) {
        case 'health':
          if (player.health >= player.maxHealth) return true;
          player.health = Math.min(player.maxHealth, player.health + 25);
          addNotification('+25 HEALTH', '#0f0', 60);
          break;
        case 'ammo':
          // Add ammo to current weapon
          if (weapons[player.weaponIdx].ammo !== Infinity) {
            player.weaponAmmo[player.weaponIdx] = Math.min(
              weapons[player.weaponIdx].maxAmmo,
              player.weaponAmmo[player.weaponIdx] + Math.ceil(weapons[player.weaponIdx].maxAmmo * 0.5)
            );
          }
          addNotification('+AMMO', '#ff0', 60);
          break;
        case 'armor':
          if (player.armor >= player.maxArmor) return true;
          player.armor = Math.min(player.maxArmor, player.armor + 30);
          addNotification('+30 ARMOR', '#48f', 60);
          break;
        // weapon pickups removed — weapons are bought at the Home Base now
      }
      playSound('pickup');
      return false;
    }
    return true;
  });

  // --- Projectile update ---
  projectiles = projectiles.filter(p => {
    p.x += p.dx; p.y += p.dy;
    p.life--;
    // Trail particles
    if (frameCount % 2 === 0) {
      particles.push({
        x: p.x, y: p.y, z: 0,
        vx: (Math.random()-0.5)*0.01, vy: (Math.random()-0.5)*0.01, vz: 0,
        r: 255, g: 120, b: 30, life: 0.4, size: 3,
      });
    }
    // Wall collision
    if (getMap(Math.floor(p.x), Math.floor(p.y)) !== 0) {
      explode(p.x - p.dx, p.y - p.dy, p.damage, p.splashR);
      return false;
    }
    // Enemy collision (only player projectiles)
    if (p.owner === 'player') {
      for (const e of enemies) {
        if (e.deathTimer >= 0) continue;
        if (Math.hypot(p.x - e.x, p.y - e.y) < e.radius + 0.2) {
          explode(p.x, p.y, p.damage, p.splashR);
          return false;
        }
      }
    }
    return p.life > 0;
  });

  // --- Enemy update ---
  for (const e of enemies) {
    if (e.hitFlash > 0) e.hitFlash--;

    // Death animation
    if (e.deathTimer >= 0) {
      e.deathTimer++;
      continue;
    }

    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.hypot(dx, dy);
    const angleToPlayer = Math.atan2(dy, dx);

    // State machine
    switch (e.state) {
      case 'idle':
        e.stateTimer--;
        // Slow wander rotation when idle
        e.angle += Math.sin(frameCount * 0.02 + e.x * 3) * 0.015;
        if (dist < e.alertRange || e.stateTimer <= 0) {
          e.state = 'alert';
        }
        break;
      case 'alert':
        // Move toward player
        e.angle = angleToPlayer;
        const moveSpeed = e.speed;

        if (e.melee || dist > 4) {
          const nx = e.x + Math.cos(e.angle) * moveSpeed;
          const ny = e.y + Math.sin(e.angle) * moveSpeed;
          if (canMove(nx, ny, e.radius)) {
            let blocked = false;
            for (const other of enemies) {
              if (other === e || other.deathTimer >= 0) continue;
              if (Math.hypot(nx - other.x, ny - other.y) < e.radius + other.radius) {
                blocked = true; break;
              }
            }
            if (!blocked) { e.x = nx; e.y = ny; }
          } else {
            // Try to go around obstacles
            for (const alt of [e.angle + 0.7, e.angle - 0.7]) {
              const ax = e.x + Math.cos(alt) * moveSpeed;
              const ay = e.y + Math.sin(alt) * moveSpeed;
              if (canMove(ax, ay, e.radius)) {
                e.x = ax; e.y = ay; break;
              }
            }
          }
        } else if (!e.melee) {
          // Strafe when close enough
          e.strafeTimer--;
          if (e.strafeTimer <= 0) {
            e.strafeDir *= -1;
            e.strafeTimer = 60 + Math.random() * 60;
          }
          const strafeAngle = e.angle + Math.PI / 2 * e.strafeDir;
          const sx = e.x + Math.cos(strafeAngle) * moveSpeed * 0.7;
          const sy = e.y + Math.sin(strafeAngle) * moveSpeed * 0.7;
          if (canMove(sx, sy, e.radius)) { e.x = sx; e.y = sy; }
        }

        // Attack
        e.fireTimer--;
        if (e.fireTimer <= 0) {
          e.fireTimer = e.fireCooldown + Math.random() * 30;

          if (e.melee) {
            if (dist < e.range) {
              hurtPlayer(e.damage, angleToPlayer);
            }
          } else {
            // Ranged attack - check LOS
            if (dist < e.range && hasLineOfSight(e.x, e.y, player.x, player.y)) {
              // Accuracy based on distance
              const accuracy = Math.max(0.3, 1 - dist / e.range);
              if (Math.random() < accuracy) {
                hurtPlayer(e.damage, angleToPlayer);
                // Tracer particles
                const steps = Math.floor(dist * 3);
                for (let i = 0; i < steps; i++) {
                  const t = i / steps;
                  particles.push({
                    x: e.x + dx * t, y: e.y + dy * t, z: 0,
                    vx: 0, vy: 0, vz: 0,
                    r: 255, g: 200, b: 50, life: 0.2, size: 1,
                  });
                }
              }
            }
          }
        }
        break;
    }
  }

  // Remove fully dead enemies
  enemies = enemies.filter(e => e.deathTimer < 0 || e.deathTimer < 40);

  // --- Particle update ---
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
    p.vz += 0.001; // gravity
    p.life -= 0.025;
    return p.life > 0;
  });
  if (particles.length > 200) particles.splice(0, particles.length - 200);

  // --- Notifications ---
  notifications = notifications.filter(n => { n.timer--; return n.timer > 0; });
  killFeed = killFeed.filter(k => { k.timer--; return k.timer > 0; });

  // --- Wave system ---
  const alive = enemies.filter(e => e.deathTimer < 0).length;
  if (alive === 0 && !waveActive) {
    waveDelay++;
    if (waveDelay > 120) spawnWave();
  }
  if (alive === 0 && waveActive) {
    waveActive = false;
    waveDelay = 0;
    if (wave > 0) addNotification('HORDE ELIMINATED', '#0f0', 90);
  }
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
const TICK_RATE = 1000 / 60;
let accumulator = 0;

function gameLoop(time) {
  if (lastTime === 0) lastTime = time;
  const dt = Math.min(time - lastTime, 100); // Cap dt to 100ms to prevent spiral
  lastTime = time;

  // FPS counter
  fpsCounter++;
  if (time - lastFpsTime > 1000) {
    fps = fpsCounter;
    fpsCounter = 0;
    lastFpsTime = time;
  }

  if (gameStarted && !gameOver) {
    accumulator += dt;
    // Cap accumulator to prevent death spiral
    if (accumulator > TICK_RATE * 5) accumulator = TICK_RATE * 5;
    while (accumulator >= TICK_RATE) {
      update();
      accumulator -= TICK_RATE;
    }
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (!gameStarted || gameOver) return;

  if (e.code === 'KeyR') startReload();

  // Weapon switching
  for (let n = 1; n <= 9; n++) {
    if (e.code === 'Digit' + n && player.hasWeapon[n - 1]) { player.weaponIdx = n - 1; player.reloading = false; }
  }
});

document.addEventListener('keyup', e => keys[e.code] = false);

document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === mainCanvas) {
    mouseDX += e.movementX;
    mouseDY += e.movementY;
  }
});

// Start (or restart) a run from the Home Base. World assets init once; the
// rest resets every deploy. Called by the DEPLOY button.
function startRun() {
  if (!worldInitialized) {
    initAudio();
    startAmbience();
    addTorchLights();
    spawnProps();
    generateWallDecals();
    initZoneParticles();
    initRain();
    worldInitialized = true;
  }
  player.x = 16; player.y = 16; player.angle = 0; player.pitch = 0;
  player.health = 100; player.armor = 0;
  player.weaponIdx = 0;
  player.hasWeapon = weapons.map(w => save.ownedWeapons.includes(w.id));
  player.hasWeapon[0] = true; // pistol always owned
  player.weaponAmmo = weapons.map((w, i) => w.ammo === Infinity ? Infinity : (player.hasWeapon[i] ? w.maxAmmo : 0));
  player.score = 0; player.kills = 0; player.combo = 0; player.comboTimer = 0;
  player.bestCombo = 0; player.totalDamageDealt = 0; player.shotsFired = 0; player.shotsHit = 0;
  player.reloading = false; player.shootCooldown = 0;
  player.shakeAmount = 0;
  player.damageDir = [];
  enemies = []; pickups = []; projectiles = []; particles = [];
  notifications = []; killFeed = [];
  wave = 0; waveDelay = 60; waveActive = false;
  gameOver = false;
  gameStarted = true;
  atHome = false;
  document.getElementById('home-base').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';
  mainCanvas.requestPointerLock();
}

// Return to the Home Base (from death). The run freezes; coins are already banked.
function openHome() {
  gameStarted = false;
  gameOver = false;
  atHome = true;
  document.exitPointerLock();
  updateCoinDisplays();
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('home-base').style.display = 'flex';
}

document.getElementById('deploy-btn').addEventListener('click', startRun);
document.getElementById('death-screen').addEventListener('click', () => { if (gameOver) openHome(); });

// --- Arsenal shop: buy weapons with coins; owned weapons spawn with you ---
function weaponStatLine(w) {
  let s = 'DMG ' + (w.pellets > 1 ? (w.damage * w.pellets) + ' (x' + w.pellets + ')' : w.damage);
  if (w.auto) s += ' · AUTO';
  if (w.splashR > 0) s += ' · SPLASH';
  return s;
}
function renderArsenal() {
  document.getElementById('arsenal-coins').textContent = '🪙 ' + save.coins;
  document.getElementById('arsenal-list').innerHTML = weapons.map(w => {
    const owned = save.ownedWeapons.includes(w.id);
    const afford = save.coins >= w.price;
    const btn = owned
      ? '<button class="wpn-buy" disabled>OWNED</button>'
      : '<button class="wpn-buy" data-buy="' + w.id + '"' + (afford ? '' : ' disabled') + '>🪙 ' + w.price + '</button>';
    return '<div class="wpn-card' + (owned ? ' owned' : '') + '">' +
      '<div><div class="wpn-name">' + w.name + '</div>' +
      '<div class="wpn-stats">' + weaponStatLine(w) + '</div></div>' + btn + '</div>';
  }).join('');
}
function openArsenal() {
  renderArsenal();
  document.getElementById('home-base').style.display = 'none';
  document.getElementById('arsenal').style.display = 'flex';
}
function closeArsenal() {
  document.getElementById('arsenal').style.display = 'none';
  document.getElementById('home-base').style.display = 'flex';
}
function buyWeapon(id) {
  const w = weapons.find(x => x.id === id);
  if (!w || save.ownedWeapons.includes(id) || save.coins < w.price) return;
  save.coins -= w.price;
  save.ownedWeapons.push(id);
  writeSave();
  updateCoinDisplays();
  renderArsenal();
}
document.getElementById('arsenal-tab').addEventListener('click', openArsenal);
document.getElementById('arsenal-back').addEventListener('click', closeArsenal);
document.getElementById('arsenal-list').addEventListener('click', e => {
  const b = e.target.closest('[data-buy]');
  if (b) buyWeapon(b.getAttribute('data-buy'));
});

// --- Cases: open with coins, spin, win a skin (duplicates refund coins) ---
function renderCaseList() {
  document.getElementById('cases-coins').textContent = '🪙 ' + save.coins;
  document.getElementById('case-list').innerHTML = cases.map(c => {
    const afford = save.coins >= c.price && !spinning;
    const odds = 'Legendary ' + c.weights.legendary + '% · Epic ' + c.weights.epic + '%';
    return '<div class="case-card"><div><div class="case-name">📦 ' + c.name + '</div>' +
      '<div class="case-odds">' + odds + '</div></div>' +
      '<button class="case-buy" data-open="' + c.id + '"' + (afford ? '' : ' disabled') + '>🪙 ' + c.price + '</button></div>';
  }).join('');
}
function openCase(caseId) {
  if (spinning) return;
  const c = cases.find(x => x.id === caseId);
  if (!c || save.coins < c.price) return;
  spinning = true;
  save.coins -= c.price;
  const won = rollCaseSkin(c);
  const WIN_INDEX = 45, TILES = 52, TILE_W = 120;
  const strip = [];
  for (let i = 0; i < TILES; i++) strip.push(i === WIN_INDEX ? won : skins[Math.floor(Math.random() * skins.length)]);
  const stripEl = document.getElementById('spin-strip');
  stripEl.innerHTML = strip.map(s => {
    const rc = RARITY[s.rarity].color;
    return '<div class="spin-tile" style="border-color:' + rc + '"><div class="tile-name" style="color:' + rc +
      '">' + s.name + '</div><div class="tile-rar">' + RARITY[s.rarity].name + '</div></div>';
  }).join('');
  document.getElementById('spin-wrap').style.display = 'block';
  document.getElementById('spin-result').textContent = '';
  updateCoinDisplays();
  renderCaseList();
  stripEl.style.transition = 'none';
  stripEl.style.transform = 'translateX(0)';
  const wrapW = document.getElementById('spin-wrap').clientWidth;
  const target = WIN_INDEX * TILE_W + TILE_W / 2 - wrapW / 2 + (Math.random() * 50 - 25);
  requestAnimationFrame(() => {
    stripEl.style.transition = 'transform 4.2s cubic-bezier(.12,.78,.3,1)';
    stripEl.style.transform = 'translateX(' + (-target) + 'px)';
  });
  let done = false;
  const finish = () => {
    if (done) return; done = true;
    spinning = false;
    const dupe = save.ownedSkins.includes(won.id);
    const rc = RARITY[won.rarity].color;
    let msg;
    if (dupe) {
      const refund = Math.floor(c.price * 0.4);
      save.coins += refund;
      msg = '<span style="color:' + rc + '">' + won.name + '</span> (duplicate) — refunded 🪙 ' + refund;
    } else {
      save.ownedSkins.push(won.id);
      msg = 'Unlocked <span style="color:' + rc + '">' + won.name + '</span> — ' + RARITY[won.rarity].name +
        '! <button data-equip="' + won.id + '">EQUIP</button>';
    }
    writeSave();
    updateCoinDisplays();
    document.getElementById('cases-coins').textContent = '🪙 ' + save.coins;
    document.getElementById('spin-result').innerHTML = msg;
    renderCaseList();
  };
  stripEl.addEventListener('transitionend', finish, { once: true });
  setTimeout(finish, 4600);
}
function openCases() {
  renderCaseList();
  document.getElementById('spin-wrap').style.display = 'none';
  document.getElementById('spin-result').textContent = '';
  document.getElementById('home-base').style.display = 'none';
  document.getElementById('cases').style.display = 'flex';
}
function closeCases() {
  if (spinning) return;
  document.getElementById('cases').style.display = 'none';
  document.getElementById('home-base').style.display = 'flex';
}

// --- Skins locker: equip owned weapon skins + HUD themes (click equipped to remove) ---
function equipSkin(id) {
  const s = skinById(id);
  if (!s || !save.ownedSkins.includes(id)) return;
  if (s.type === 'weapon') save.equippedWeaponSkin = (save.equippedWeaponSkin === id ? null : id);
  else save.equippedHudTheme = (save.equippedHudTheme === id ? null : id);
  writeSave();
  renderLocker();
}
function renderLocker() {
  const card = s => {
    const owned = save.ownedSkins.includes(s.id);
    const equipped = (s.type === 'weapon' ? save.equippedWeaponSkin : save.equippedHudTheme) === s.id;
    const rc = RARITY[s.rarity].color;
    return '<div class="skin-card' + (owned ? '' : ' locked') + (equipped ? ' equipped' : '') + '"' +
      (owned ? ' data-equip="' + s.id + '"' : '') +
      ' style="border-color:' + (equipped ? rc : (owned ? rc + '88' : '#333')) + '">' +
      '<div class="skin-name" style="color:' + (owned ? rc : '#555') + '">' + s.name + '</div>' +
      '<div class="skin-rar">' + (owned ? (equipped ? 'EQUIPPED' : RARITY[s.rarity].name) : '🔒 ' + RARITY[s.rarity].name) + '</div></div>';
  };
  document.getElementById('weapon-skin-list').innerHTML = skins.filter(s => s.type === 'weapon').map(card).join('');
  document.getElementById('hud-skin-list').innerHTML = skins.filter(s => s.type === 'hud').map(card).join('');
}
function openLocker() {
  renderLocker();
  document.getElementById('home-base').style.display = 'none';
  document.getElementById('locker').style.display = 'flex';
}
function closeLocker() {
  document.getElementById('locker').style.display = 'none';
  document.getElementById('home-base').style.display = 'flex';
}
document.getElementById('cases-tab').addEventListener('click', openCases);
document.getElementById('cases-back').addEventListener('click', closeCases);
document.getElementById('skins-tab').addEventListener('click', openLocker);
document.getElementById('locker-back').addEventListener('click', closeLocker);
document.getElementById('case-list').addEventListener('click', e => {
  const b = e.target.closest('[data-open]');
  if (b) openCase(b.getAttribute('data-open'));
});
document.getElementById('spin-result').addEventListener('click', e => {
  const b = e.target.closest('[data-equip]');
  if (b) { equipSkin(b.getAttribute('data-equip')); b.textContent = 'EQUIPPED ✓'; b.disabled = true; }
});
document.getElementById('locker').addEventListener('click', e => {
  const b = e.target.closest('[data-equip]');
  if (b) equipSkin(b.getAttribute('data-equip'));
});

document.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  if (atHome || gameOver) return;       // Home Base / death screen have their own buttons
  if (document.pointerLockElement !== mainCanvas) {
    mainCanvas.requestPointerLock();
    return;
  }
  mouseDown = true;
  if (!weapons[player.weaponIdx].auto) fireWeapon();
});

document.addEventListener('mouseup', e => {
  if (e.button === 0) mouseDown = false;
});

// Mouse wheel weapon switch
document.addEventListener('wheel', e => {
  if (!gameStarted || gameOver) return;
  const dir = e.deltaY > 0 ? 1 : -1;
  let next = player.weaponIdx;
  for (let i = 0; i < weapons.length; i++) {
    next = (next + dir + weapons.length) % weapons.length;
    if (player.hasWeapon[next]) { player.weaponIdx = next; player.reloading = false; break; }
  }
});

// Start loop
requestAnimationFrame(gameLoop);
</script>
